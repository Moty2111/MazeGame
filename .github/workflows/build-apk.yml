name: Сборка APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Установка зависимостей
        run: npm ci

      - name: Генерация нативного Android проекта
        run: npx expo prebuild --platform android --no-install

      - name: Создание ключа подписи
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 123456 -keypass 123456 \
            -dname "CN=, OU=, O=, L=, S=, C="

      - name: Настройка подписи в build.gradle
        run: |
          python3 -c "
          with open('android/app/build.gradle', 'r') as f:
              lines = f.readlines()

          new_lines = []
          in_signing = False
          in_release = False
          release_fixed = False
          signing_added = False

          for line in lines:
              # Add release signing config after 'signingConfigs {'
              if 'signingConfigs {' in line and not signing_added:
                  new_lines.append(line)
                  new_lines.append('        release {\n')
                  new_lines.append('            storeFile file(\"release.keystore\")\n')
                  new_lines.append('            storePassword \"123456\"\n')
                  new_lines.append('            keyAlias \"release\"\n')
                  new_lines.append('            keyPassword \"123456\"\n')
                  new_lines.append('        }\n')
                  signing_added = True
                  continue

              # Add signingConfig to release build type
              if 'release {' in line and not release_fixed:
                  new_lines.append(line)
                  new_lines.append('            signingConfig signingConfigs.release\n')
                  release_fixed = True
                  continue

              new_lines.append(line)

          with open('android/app/build.gradle', 'w') as f:
              f.writelines(new_lines)
          "

      - name: Сборка APK
        run: cd android && ./gradlew assembleRelease

      - name: Загрузка APK
        uses: actions/upload-artifact@v4
        with:
          name: Лабиринт-для-Кати
          path: android/app/build/outputs/apk/release/*.apk
